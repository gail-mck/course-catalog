  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Fall, Winter, Spring"
  movement: true
  notes: "Meets Teams requirement. Students are scheduled for two lessons per week between the hours of 3:00 and 6:00. Students are required to provide their own helmet, boots and riding pants. There is an extra fee charged for the program. Students may enroll in riding during their Co-Curriculum placement but must attend riding lessons during their placement and meet all other attendance requirements. Typically, the school's horses have the capacity to safely carry up to 185 pounds. Boarding for student's horse is available. Applications are due May 1st. For 11th and 12th graders, if you are a rider and horse owner, you must attend D block during the season you are on Co-Curriculum. Riding has a maximum capacity of 35 riders per season."
  description: "Based on the American Forward Riding System, the program goal is to develop confidence, riding skill, and knowledge of horse care. Supportive instruction is offered to students of all experience levels including those new to the sport. A robust calendar of competitions (including IEA, USEF and schooling shows), clinics and other activities are offered year-round."

# ─────────────────────────────────────────
# ATHLETICS — SKILL DEVELOPMENT
# ─────────────────────────────────────────

- id: swimming-conditioning
  name: "Swimming for Conditioning"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "Geared towards students that are advanced level swimmers or have completed one year on the varsity swim team."
  coreqs: "None"
  season: "Fall"
  movement: true
  notes: "Roster Minimum: 6, Roster Maximum: 20. This activity requires a student to be able to be in the pool each day (Mon–Fri) of the season."
  description: "This course will cover the four main competitive strokes, turns, and will contain a rigorous workout."

- id: mad-aquatics
  name: "Mad Aquatics"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "Geared toward Varsity level swimmers."
  coreqs: "None"
  season: "Spring"
  movement: true
  notes: "Roster Minimum: 4, Roster Maximum: 12. This activity requires a student to be able to be in the pool each day (Mon-Fri) of the season and participate in 2-3 weekend competitions in the spring."
  description: "This course is geared toward Varsity level swimmers. This course will be similar in training to our varsity season."

- id: tennis-101
  name: "Tennis 101"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Spring"
  movement: true
  notes: "Roster Minimum: 4, Roster Maximum: 12. Players are required to supply their own racquets and shoes appropriate for tennis courts."
  description: "This course introduces and develops the basic skill required to play tennis including the serve, forehand, backhand, volley, overhead and other specialty shots. Students will learn proper tennis etiquette, tennis specific warmup exercises, tennis match scoring, match warm up routines, and basic game strategies designed for recreational tennis match play."

- id: advanced-tennis
  name: "Advanced Tennis"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "Students must have a basic knowledge of the game and perform the basic strokes required for match play."
  coreqs: "None"
  season: "Spring"
  movement: true
  notes: "Roster Minimum: 4, Roster Maximum: 12. Players are required to supply their own racquets and shoes appropriate for tennis courts."
  description: "This course develops higher level tennis skills and techniques and assumes players already possess the basic skill sets required for recreational tennis match play. After a review of basic skills, instruction will transition to the mental and physical attributes required to execute winning offensive and defensive strategies for both singles and doubles play. Drills and practice match play for singles will explore baseline, aggressive baseline, serve and volley, and all-court styles of play. Drills and practice match play for doubles will explore traditional one up/one back, the \"I\" formation, poaching, and both back styles of play."

# ─────────────────────────────────────────
# ATHLETICS — SUPPORT ROLES
# ─────────────────────────────────────────

- id: athletic-student-assistant
  name: "Athletic Student Assistant"
  blocks: "1 per season"
  grade_levels: [10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Fall, Winter, Spring"
  movement: false
  notes: "Maximum of 3 students for Varsity. Maximum of 2 students for JV."
  description: "Athletic Team Student Assistant (SA) report to the designated sport specific practice location Monday–Friday for the duration of practice (potentially Saturday for ISL Play Days and Invitationals). SA will assist their team/coaching staff with the following tasks: taking attendance, game and event support, updating social media and filming competitions. SA must complete all scheduled team workouts each week."

- id: athletic-sports-information-assistant
  name: "Athletic Team Sports Information Assistant"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Fall, Winter, Spring"
  movement: false
  notes: "Maximum of 3–4 students per season. SIA must complete at least 2–3 Breakaway workouts each week."
  description: "To receive D-block credit the Athletic Team Sports Information Assistants (SIA) reports to the Athletic Director or Associate Athletic Director Monday–Friday for the duration of practice (potentially Saturday for ISL Play Days and Invitationals). SIA will assist the athletic department with the following tasks: creating social media content, creating pre and post-game graphics, running in-game livestream, updating social media and filming competitions, and posting game results."

- id: athletic-training-assistant
  name: "Athletic Training Student Assistant"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Fall, Winter, Spring"
  movement: false
  notes: "Maximum of 1 student per season. For students with an expressed interest in a sports medicine related field."
  description: "The Athletic Training Student Assistant (ATSA) works with the Madeira Athletic Trainer daily with an expectation to observe and participate in duties connected with injury management. ATSA will learn basic anatomy and common mechanisms of injury. At the completion of each season, students are expected to demonstrate specific competencies based on areas of focus."