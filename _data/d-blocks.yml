# ─────────────────────────────────────────
# PERFORMING ARTS D-BLOCKS
# ─────────────────────────────────────────

- id: dance
  name: "Dance"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "No prior dance experience required."
  coreqs: "None"
  season: "Fall, Winter, Spring"
  movement: true
  notes: "Madeira Dance Company (formally Select) requires an audition which takes place at the end of the Spring Season of the previous year for all returning students. For 11th and 12th graders, if you are a Madeira Dancer, you must attend D block during the season you are on Co-Curriculum (though not the mod in which you have your internship, unless your hours allow). All Madeira Dance Company members must be enrolled in at least 2 seasons of dance."
  description: "Genres studied: Modern, hip hop, ballet, lyrical, jazz, and contemporary. 2 masterclasses offered each season in an even broader range of genre. During the first week evaluation classes will take place to assess which level the dancer will participate in."

- id: play
  name: "Play (Fall Production)"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "Auditions are held during student orientation for actors. Students interested in stage management and assistant directing must seek prior approval from the Arts Department."
  coreqs: "None"
  season: "Fall"
  movement: true
  description: "The fall play offers students of various skill levels and experience the opportunity to participate in a fully-staged play as an actor or part of the stage management team."

- id: musical
  name: "Musical (Winter Production)"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "Audition required for actors. Students interested in stage management and assistant directing must seek prior approval from the Arts Department."
  coreqs: "None"
  season: "Winter"
  movement: true
  description: "The winter musical is for students of all levels of skill and experience in musical theatre and stage managing. Students work as a collaborative ensemble with theatre professionals to rehearse and perform a musical theatre production."

- id: theater-showcase
  name: "Theater Showcase"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Spring"
  movement: true
  description: "Theatre Showcase is open to all levels of experience. This D block is a unique opportunity for students to participate in a performance-based class without the pressure of auditions. The Theater Showcase gives students the chance to explore a variety of theatrical styles and develop their performance skills and technique. Topics covered include improvisation, physical theatre, scene study, stage combat and audition technique."

# ─────────────────────────────────────────
# PUBLICATIONS & MEDIA D-BLOCKS
# ─────────────────────────────────────────

- id: student-publications-spectator
  name: "Student Publications: The Spectator"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Fall, Winter, Spring"
  movement: false
  description: "Students will learn core principles of journalism including accuracy, accountability, fairness verification, and independence. Along the way, students will acquire practical skills in interviewing, reporting, and composing a variety of story types (such as news, feature, and editorial). Students can also expect to practice photography and arranging layouts using publishing programs like InDesign. Throughout each season, Spectator students will also explore case studies to build awareness of journalistic ethics. This is a hands-on educational experience where students learn to work as a newsroom team."

- id: student-publications-gate
  name: "Student Publications: GATE"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Fall, Winter, Spring"
  movement: false
  description: "Students will acquire practical skills in design and layout (using programs like InDesign) and in learning the editorial process. They will also exercise their creativity in organizing Gate contributions according to theme, genre, concept, and/or style—in addition to serving as contributors themselves, should they wish. Gate staff will gain technical know-how and learn about the philosophical and ethical issues of publishing like censorship, anonymity, and managing the relationship between authors and editors. Students will also be responsible for marketing and outreach, and for identifying innovative ways of showcasing the publication such as podcasting, performance, and online publishing."

- id: yearbook
  name: "Yearbook"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Fall, Winter"
  movement: false
  description: "Yearbook exposes students to the variety of skills necessary for producing quality school publications. Participants are introduced to a variety of visual arts, including digital photography, the use of photo editors, and principles of layout design. In addition, students learn the basics of copywriting and journalism, including conducting interviews, and writing news stories, reviews and features. This is a hands-on educational experience, where students learn by doing. Students are given the responsibility of producing their own pages in the yearbook."

- id: esports
  name: "Esports"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Fall"
  movement: false
  notes: "Maximum of 10 students."
  description: "The Madeira esports team fuses passion and opportunity to ensure students succeed in a competitive digital world. During this activity students will explore careers in digital industries, learn the fundamentals of live video streaming, and explore ethics and contemporary issues through a variety of different digital experiences and game styles. Students will develop skills in teamwork and problem solving helping to foster self-confidence and independent critical thinking while maintaining a healthy environment for competition through digital game play."

# ─────────────────────────────────────────
# ACADEMIC & INTEREST D-BLOCKS
# ─────────────────────────────────────────

- id: math-team
  name: "Math Team"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Fall"
  movement: false
  description: "Students participate in math related challenges, activities, and competitions. No prior math or computer science knowledge is required, only an interest in learning and participating. Students may participate in math competitions."

- id: model-un
  name: "Model United Nations"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Winter"
  movement: false
  notes: "For students who elect to participate in outside conferences, there are additional fees not covered by Madeira."
  description: "During their participation, Madeira students learn the basics of United Nations parliamentary procedure, how to write position and background papers, and how to advance committee agendas during active conference sessions. Madeira students may elect—as part of the Model UN experience—to participate in a high-school conference for Model United Nations."

- id: nature-hikes
  name: "Nature Hikes"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Spring"
  movement: true
  description: "This activity takes advantage of our idyllic setting on the edge of the Potomac River. Students will explore a variety of trails on campus through the forest and down by Black Pond. There will be periodic trips to nearby parks including Scotts Run and Riverbend Park. Students will increase their knowledge about the natural species on our campus and beyond."

- id: open-art-studio
  name: "Open Art Studio"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Spring"
  movement: false
  description: "Open Art Studio is an experience that allows students to explore a variety of media including drawing, painting, ceramics, sculpture, digital drawing, and more. Students will learn new techniques through workshops in different mediums and complete multiple larger projects. This D block is ideal for the student looking to further their visual art practice or just explore new techniques."

- id: space-mission-exploration
  name: "Space Mission Exploration"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Spring"
  movement: false
  description: "Students will design their own space mission through an interdisciplinary lens. Students will consider the science, engineering, management, budget, and geopolitical requirements for the design and execution of a successful space mission. The D Block will be based on a simulation of the NASA project mission design process, from conceptual study, preliminary analysis, and definition to the design, development, and operational phases of a space mission."

- id: global-activism
  name: "Global Activism"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Spring"
  movement: false
  description: "Students in Global Activism will discuss theories of change, explore the architecture and toolkit of protests around the world, meet with activists locally and globally, and, ultimately, design (from start to finish) a piece of activism related to art, justice, anti-poverty, anti-racism, immigration, indigenous land rights, the sex-gender system, planetary health, community change, or a topic of choice."

# ─────────────────────────────────────────
# FITNESS D-BLOCKS
# ─────────────────────────────────────────

- id: intro-fitness-strength
  name: "Intro to Fitness & Strength Training"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Fall, Winter, Spring"
  movement: true
  notes: "Roster Minimum: 4, Roster Maximum: 12."
  description: "Students will be introduced to the basics of circuit training, weight training, and cardio training. Students will learn proper form and techniques that will allow them to develop independent workouts."

- id: advanced-weight-training
  name: "Advanced Weight Training"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "Students must complete Intro to Fitness & Strength Training or Compete on a Varsity Team"
  coreqs: "None"
  season: "Fall, Winter, Spring"
  movement: true
  notes: "Roster Minimum: 4, Roster Maximum: 12."
  description: "Advanced Weight Training aims to illustrate our athletic philosophy by developing strong women who succeed at life. Strength builds confidence. Students will engage in free-weight training led by our Strength and Conditioning Coach using barbell, dumbbell, kettlebell, and medicine ball movements. Students will learn the value of consistent work to reach their maximum potential through the techniques of strength training."

- id: pilates
  name: "Pilates"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Fall, Winter, Spring"
  movement: true
  notes: "Roster Minimum: 6, Roster Maximum: 14."
  description: "Mat-based Pilates class focuses on strength, stability, posture, proper breath control, and flexibility. Each class will work to balance all muscle groups' strength and flexibility, with an emphasis on challenging the core muscles with each movement. Classes will be taught using slow, controlled movements."

- id: yoga
  name: "Yoga"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Fall, Winter, Spring"
  movement: true
  notes: "Roster Minimum: 6, Roster Maximum: 14."
  description: "A mat-based exercise class that uses a system of physical postures, breathing techniques, and meditation derived from Yoga to promote physical and emotional well-being."

- id: self-defense-karate
  name: "Self-Defense/Karate"
  blocks: "1 per season"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  season: "Winter"
  movement: true
  description: "While learning the skills necessary for self-protection, students will experience the benefits of increased physical fitness, better mental focus, enhanced self-confidence, and a more placid state of mind. They learn karate techniques utilizing the upper and lower body and learn to strike vital areas with elbows, knees, hands, and feet. Students will also learn how to fall and how to throw others in self-defense situations. The traditions of bowing, wearing the karate uniform (gi), and using special terminology will be practiced in the school (dojo) to create an atmosphere that promotes safety and respect for oneself, for one's classmates, and for the teacher (sensei)."

