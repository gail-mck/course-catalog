- id: student-life
  name: "Student Life"
  blocks: "2"
  grade_levels: [9]
  prereqs: "None"
  coreqs: "None"
  notes: "Required of all ninth graders."
  description: "The Student Life ninth grade curriculum focuses on knowledge and skills Madeira students will need as community members and into their future. We engage students in the examination of who they are as individuals, how they influence and are influenced by others, and how they can care for themselves and cultivate healthy and inclusive communities. Each student will develop and apply essential life skills as she builds a deeper understanding of herself and of those around her. Students will be assessed through experiential activities, inquiry-based projects, presentations, journal entries, papers, and class participation. This course is taught by faculty and staff members from various departments, giving students the opportunity to learn from community members not usually found in the classroom. These faculty and staff members bring their unique, professional perspectives to the curriculum."

- id: design-thinking-lab
  name: "Design Thinking Lab"
  blocks: "1"
  grade_levels: [9, 10]
  prereqs: "None"
  coreqs: "None"
  notes: "Required for all 9th and new 10th graders. Starting with the Class of 2028, all new, incoming 10th graders enroll in the Design Thinking Lab."
  description: "In this transdisciplinary, inquiry-based course, students study real-world topics as they learn about and employ design thinking concepts. Students will gain knowledge of and employ the Elements and Principles of Design, the Design Engineering Process, 3D Printing, Laser cutting, and technical drawing throughout their project work."

- id: mindfulness-and-the-brain
  name: "Mindfulness and the Brain"
  blocks: "1"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  description: "Mindfulness practice involves paying attention to the present moment in a specific and deliberate way without judgment. Research shows that mindfulness can have a profound impact on the way neurons fire in the brain and subsequently the way different regions in the brain, most notably the prefrontal cortex, communicate with each other. In other words, mindfulness practice can permanently influence how we think. Through examination of the work of Daniel Siegel, Jon Kabat-Zinn, and others, students will investigate the anatomy, functions, and interconnectedness of the brain, how the brain continues to change over the lifespan, and how mindfulness practice impacts the brain's functions and by extension, one's ability to make decisions, regulate emotions, and interact with others. This course will provide each student the opportunity to explore the basic tenets of mindfulness, experience different ways to focus attention and increase awareness, and develop her own unique daily mindfulness practice."