- id: studio-art-drawing
  name: "Studio Art: Drawing"
  blocks: "1"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  description: "Drawing is the foundation course for students interested in visual arts and eager to expand their creative abilities. Students will be instructed in the use of the design elements and principles through projects such as mark making, perspective drawing, and still-life composition."

- id: studio-art-3d-design
  name: "Studio Art: 3D Design"
  blocks: "1-3"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  description: "3D Design is a course for students eager to advance their understanding of 3-dimensional art across a variety of media. Students will use various materials and techniques such as ceramic handbuilding, carving, modeling, fibers, textiles, and armature building to create 3-dimensional works of art."

- id: programming-visual-arts
  name: "Programming for the Visual Arts"
  blocks: "1"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  notes: "This course satisfies the Coding and Interdisciplinary requirement."
  description: "This course is an introduction to computer programming within the context of the visual arts. Utilizing the Processing language, students will learn basic coding techniques, explore the fundamentals of computer graphics and create interactive drawing programs."

- id: design-arts-mediums
  name: "Design Arts & Mediums"
  blocks: "1"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  notes: "This course satisfies the Design Thinking requirement."
  description: "Digital Arts & Design is for students interested in developing skills using digital tools for artistic creation and visual communication. Students will learn a variety of software, including Adobe Design Suite, TinkerCad, Fusion360, and more, used in creating animation, digital illustration, graphic design and branding, 3D modeling, and industrial and package design. Projects will be student-centered, emphasizing creative problem-solving and real-world applications."

- id: studio-art-painting
  name: "Studio Art: Painting"
  blocks: "1-3"
  grade_levels: [9, 10, 11, 12]
  prereqs: "Studio Art: Drawing"
  coreqs: "None"
  description: "Painting is for students who are eager to advance their painting skills and develop greater understanding of selected painting styles and mediums. Students will learn to create using acrylics, watercolors, gouache, and mixed media."

- id: studio-art-printmaking
  name: "Studio Art: Printmaking"
  blocks: "1-3"
  grade_levels: [9, 10, 11, 12]
  prereqs: "Studio Art: Drawing"
  coreqs: "None"
  description: "Printmaking is a course intended for students who are interested in advancing their understanding of the elements and principles of design through the medium of printmaking. Students will work with a wide range of materials and processes such as collagraph, linoleum cut, drypoint, and relief printing."

- id: studio-art-fashion-design
  name: "Studio Art: Fashion Design & Fabrication"
  blocks: "1"
  grade_levels: [9, 10, 11, 12]
  prereqs: "Studio Art: 3D Design OR Studio Art: Drawing"
  coreqs: "None"
  notes: "Meets Design Thinking credit and art credit."
  description: "This class will focus on creating a fashion collection from start to finish. In this class students will use multiple art mediums such collaging, color theory, textile making, repeat pattern and fashion rendering to create a fashion collection. Students will create a mood board, color plates, fabric designs, fashion renderings and a final portfolio. Students will leave class knowing how to read a pattern, make a flat pattern and create a garment using hand sewing and machine sewing skills."

- id: studio-art-ceramics
  name: "Studio Art: Ceramics"
  blocks: "1"
  grade_levels: [9, 10, 11, 12]
  prereqs: "Studio Art: 3D Design or Studio Art: Drawing"
  coreqs: "None"
  description: "This course will introduce students to building and exploring clay, the basic techniques involved in ceramic construction, and the chemistry involved in the firing process. Various glaze and decoration techniques for finishing work will also be introduced. Emphasis will be placed on the design elements and principles. Focus will be on the various techniques: pinch, coil and slabs and throwing on the wheel. Functional as well as sculptural applications based on form will be also explored."

- id: studio-art-seminar
  name: "Studio Art Seminar"
  blocks: "3"
  grade_levels: [10, 11, 12]
  prereqs: "At least three blocks of Studio Art and/or Photography classes."
  coreqs: "None"
  description: "In this advanced level course, students will work towards expanding their artistic practice, developing breadth across various mediums, and depth within a specific artistic medium of their choice. Students will develop skills in presenting their work through gallery displays, portfolios, and an online presence. Finally, students will work towards building an artist's resume and CV."

- id: photography-darkroom
  name: "Photography: Darkroom"
  blocks: "1"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  notes: "Meets Design Thinking and Art credit."
  description: "Students will learn how to use and control a school-supplied 35mm SLR film camera, develop negatives, create contact sheets and print photographs. In the process, they will learn how cameras work as well as the fundamentals of composition."

- id: photography-digital
  name: "Photography: Digital"
  blocks: "1"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  notes: "Students must supply their own DSLR camera that is capable of being used in Manual mode."
  description: "Students will further their photography skills by learning how to use their own digital camera (see special note) in Manual mode. The course includes a variety of compositional techniques, Photoshop editing skills, and beginning portfolio development."

- id: photography-alternative-processes
  name: "Photography: Alternative Processes"
  blocks: "1"
  grade_levels: [9, 10, 11, 12]
  prereqs: "Darkroom or Digital Photography"
  coreqs: "None"
  notes: "Meets Design Thinking and art credit."
  description: "This course introduces students to the fundamentals of non-silver alternative photographic processes with emphasis on technical skills, and critique of photographic work. Among the processes studied: Caffenol development, and medium and large format photographic processes. Students will learn skills related to safe chemistry usage, scanning, Photoshop manipulation to create and print digital negatives, paper coating and contact printing techniques."

- id: acting-i
  name: "Acting I: Acting Skills"
  blocks: "1"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  description: "Students will learn techniques and develop acting skills through ensemble work, monologues, scene work, and a mock audition experience. In this class students will focus on script analysis, character development, and voice and body awareness."

- id: acting-ii
  name: "Acting II: Acting Styles"
  blocks: "1"
  grade_levels: [9, 10, 11, 12]
  prereqs: "Acting I, participation in a theatre D block, or permission of the instructor"
  coreqs: "None"
  description: "Building on skills learned in Acting I, students will explore various theatrical styles including Shakespeare, Restoration, and farce. Through warm-ups, voice and movement exercises, script analysis, and monologue and scene work, actors will apply acting techniques to each style."

- id: public-speaking
  name: "Public Speaking"
  blocks: "1"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  description: "From casual announcements to formal presentations, we are tasked with public speaking daily. Students will learn techniques for harnessing their authentic presentation style to engage an audience including projection, articulation, body language, vocal tone, and eye contact. Focusing on the link between public speaking and storytelling, the class will culminate in students giving a speech in the Ignite style."

- id: audition-techniques
  name: "Audition Techniques"
  blocks: "1"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  description: "Whether training to be a professional actor, prepping for a job interview, or for college interviews, this course will help you develop the skills of commanding the room. Through text analysis, monologues and cold reads, actors will gain an understanding of character development, storytelling, vocal technique and body awareness which will serve them well in any audition room as well as any interview. This class will culminate in a mock audition experience."

- id: directing
  name: "Directing"
  blocks: "1"
  grade_levels: [10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  description: "Students will learn techniques and develop skills in Directing through the examination of open scenes, contemporary scenes and play planning. Students will gain an understanding of directing through research, text analysis and collaborative exploration."

- id: actors-voice
  name: "The Actor's Voice"
  blocks: "1"
  grade_levels: [9, 10, 11, 12]
  prereqs: "Acting I, participation in a theatre D block, or permission of the instructor"
  coreqs: "None"
  description: "Building on the vocal technique learned in Acting I, students will expand their vocal skills and usage into a variety of voiceover techniques, character voices, and more. Students will engage with the international phonetic alphabet to learn how to accurately identify sound changes to capture different dialects and accents with care."

- id: stagecraft
  name: "Stagecraft (Evening)"
  blocks: "3"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  schedule: "Open to grades 9–12, Mods 1 through 6 on Wednesdays, 6:30–9:00 pm. Additional hours required for play and musical set builds and tech weeks."
  notes: "Earns three academic credits. Course may be repeated. Enrollment is limited to 25 students. Meets Design Thinking and Art credits."
  description: "Stagecraft is a year-long, hands-on course in technical theatre and production design. Students will have the opportunity to learn scenic construction, scenic painting, properties and costume construction, lighting and sound engineering principles, technical drawing, and the production design process for theatre. Students will experience a variety of projects from sketches to building to deconstruction and along the way will learn to solve problems in creative and collaborative ways."

- id: madeira-chorus
  name: "Madeira Chorus (Evening)"
  blocks: "1 per section"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  schedule: "Open to grades 9-12 Mods 1 & 2, Mods 3 & 4, Mods 5 & 6 on Mondays and Thursdays, 6:30pm–8 p.m."
  notes: "Earns one academic credit per section taken. Course may be repeated. Students on Varsity teams (Field Hockey, Basketball, Volleyball, Swim, Tennis) should not sign up for Madeira Chorus during that season, as the time requirements overlap."
  description: "This large vocal ensemble class provides both beginner and advanced singers the opportunity to develop their choral and solo singing in a group experience, exploring a broad repertoire of music – from classical to contemporary, both accompanied and a cappella. Students prepare for two-to-three concerts and/or festivals per year. Students will also develop new or build upon existing music theory, ear training, and sight singing skills. Mods 1 & 2 will focus on classical repertoire, Mods 3 & 4 will focus on contemporary & pop, while Mods 5 & 6 will focus on Musical Theatre. Students must participate in all dress rehearsals and performances."

- id: chamber-orchestra
  name: "Chamber Orchestra (Evening)"
  blocks: "1 per section"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  schedule: "Open to grades 9-12, Mods 1 & 2, Mods 3 & 4, Mods 5 & 6 on Tuesdays and Thursdays, 6:30-8:30 p.m."
  notes: "Earns one academic credit per section taken. Course may be repeated. Students on Varsity teams (Field Hockey, Basketball, Volleyball, Swim, Tennis, Swim and Diving) should not sign up for Chamber Orchestra during that season, as the time requirements overlap."
  description: "Chamber Orchestra is open to all instrumental musicians including but not limited to strings, winds, brass, percussion, piano, and non-traditional instruments with approval. The group prepares both large and small ensembles for four to six concerts per year while exploring and learning a wide range of musical styles, idioms, and historical contexts. Required in class rehearsal time is not to exceed four hours most weeks. Students must participate in all dress rehearsals and performances."

- id: tech-events-crew
  name: "Tech Events Crew (Evening)"
  blocks: "Yearlong"
  grade_levels: [9, 10, 11, 12]
  prereqs: "None"
  coreqs: "None"
  schedule: "Yearlong non-D Block activity."
  notes: "Does not meet D-block requirement."
  description: "Tech Events Crew is a hands-on introduction to basic theatre technology focusing on stage crew and booth operations. Students of every level gain a working knowledge of theatre terminology and handle all operations involved in running special events and All School Meetings throughout the school year. In addition to crew/booth responsibilities, students will learn specialized carpentry, painting, lighting, and sound skills through monthly workshops and seminars. Includes teaching workshops and staffing events."