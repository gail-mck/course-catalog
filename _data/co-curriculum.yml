- id: sophomore-co-curriculum
  name: "Sophomore Co-Curriculum: Serving Others and the Local Community"
  blocks: "1 mod"
  grade_levels: [10]
  prereqs: "None"
  coreqs: "None"
  notes: "1 Mod, Required for 10th Graders. Sophomores will complete Co-Curriculum in either Mod 1, 3, 5, or 7. The name of the placement and the letter grade earned will appear on the final transcript, but the grade is not a part of a student's overall grade point average."
  description: "Service is one of the pillars of Madeira's founding and is the foundation for sophomore Co-Curriculum. Students will explore the concepts of social responsibility and civic engagement by serving organizations Madeira has partnered with in the local community. Students serve at these partner organizations in teams of three to ten students. About four times a mod, students remain on campus to participate in Learning to Serve Discussions and Guided Team Meetings, to reflect on their volunteer experiences and practice the skills they need to best serve others. Once a mod, students build their team skills at Calleva, the outdoor leadership program on Madeira's campus. The sophomore Co-Curriculum program helps students examine three essential questions: What is our responsibility to others? How do we best serve others? How do we develop the character and skills needed to serve others as individuals and as a team? Students are assessed on their ability to work as a member of a team, think creatively about local community challenges, demonstrate an understanding of those they serve, and persuasively present their ideas."

- id: junior-co-curriculum
  name: "Junior Co-Curriculum: Effecting Change in a Democracy"
  blocks: "1 mod"
  grade_levels: [11]
  prereqs: "None"
  coreqs: "None"
  notes: "1 Mod, Required for 11th Graders. Juniors have Co-Curriculum in Mods 2, 3, 4, 5, and 6. In some rare occasions due to scheduling conflicts, juniors may have Co-Curriculum in Mod 7. Junior Co-Curriculum is completed in the same year a student completes U.S. History, typically the junior year. The name of the placement and the letter grade earned will appear on the final transcript, but the grade is not a part of a student's overall grade point average."
  description: "Junior Co-Curriculum and the U.S. History course are an integrated program. In their U.S. History courses, students will develop knowledge and practice skills that will help them in their internship on Capitol Hill. During the internship, students will have hands-on experience that will inform their final research project for U.S. History. Because of its unique connection to the Capitol Hill internship program, U.S. History is a four-mod course. All students will complete the first mod of U.S. History course before going to their internship on Capitol Hill. During their first mod of U.S. History, students will develop a working knowledge of how the U.S. government functions and what role Capitol Hill plays. In addition, students will work with their history teacher to practice the oral and written skills, awareness of current events, and the research skills necessary to work in a Congressional Office. Students also will identify a national policy issue that is important to them. During their Congressional internship, students will submit a variety of assignments to the Co-Curriculum Office that will help them reflect upon their experience and their national policy issue. This policy issue will be the focus of their Co-Curriculum capstone project, the research-based culmination of their internship experience, as well as the final research project in U.S. History. In addition to their daily duties as Congressional interns, the Co-Curriculum Capstone project gives students the opportunity to apply skills learned in the classroom – quantitative and analytical reasoning skills, oral and written communication skills, and research and tech skills – to effect change."

- id: senior-co-curriculum
  name: "Senior Co-Curriculum: Pursuing a Passion or Curiosity"
  blocks: "1 mod"
  grade_levels: [12]
  prereqs: "None"
  coreqs: "None"
  notes: "1 Mod, Required for 12th Graders. Seniors have Co-Curriculum in Mods 2, 3, 4, 5, and 6. In some rare occasions due to scheduling conflicts, seniors may have Co-Curriculum in Mod 7. Seniors are eligible to apply for a Global Internship outside of the immediate Washington, DC area or a Summer Internship. A separate application is required for each. The name of the placement and the letter grade earned will appear on the final transcript, but the grade is not a part of a student's overall grade point average."
  description: "The Senior Co-Curriculum experience, by allowing students to participate in an internship of their choosing, provides an opportunity to pursue a passion or area of interest and to check their ideal vision against reality. Throughout their internships, students will submit reflections and various research assignments based on their experiences. Students will be challenged to investigate the internship's industry or field of study, focusing on the trends and issues facing the field and the opportunities that exist within it as a career path. Additionally, students consider the ways that they might be a leader in the field or industry, reflecting on how their placement site is meeting its goals and thinking of the ways it might improve."
