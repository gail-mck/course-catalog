<!-- font styles from online -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<!-- Use !important to override the "Just the Docs" defaults -->
<!-- Fonts, color vairables, background, side bar, side title, navigation links, full-width, course grid, course cards, popup/modal overlay-->
<style>
  body, .main-content, p, li, .nav-list-link {
    font-family: 'Nunito', sans-serif !important;
  }
  h1, h2, h3, h4, .site-title {
    font-family: 'Playfair Display', serif !important;
  }

  :root {
    --red:    #C41230;
    --cream:  #FAF8F5;
    --dark:   #3B1F1F;
    --shadow: rgba(0,0,0,0.08);
  }

  body { 
    background-color: var(--cream) !important;
    overflow-x: visible !important;
  }

  .page-wrap,
  .site,
  .container {
    overflow-x: visible !important;
  }

  .side-bar {
    width: 200px !important;
    min-width: 200px !important;
    background-color: #EDE8E0 !important;
    position: fixed !important;
    left: 0 !important;
    top: 0 !important;
    height: 100vh !important;
    z-index: 1000 !important;
  }

  .main { margin-left: 200px !important; }
</style>

<!-- The modal boxes that come up when a course is clicked. Javascript -->

<div id="course-modal" style="display:none;" role="dialog" aria-modal="true">
  <div class="modal-overlay" id="modal-backdrop">
    <div class="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      <h2 id="modal-name"></h2>
      <p class="modal-meta" id="modal-blocks"></p>

      <div id="modal-prereqs-wrap">
        <p class="modal-label">Prerequisites</p>
        <p class="modal-text" id="modal-prereqs"></p>
      </div>

      <div id="modal-coreqs-wrap">
        <p class="modal-label">Corequisites</p>
        <p class="modal-text" id="modal-coreqs"></p>
      </div>

      <div id="modal-notes-wrap">
        <p class="modal-label">Notes</p>
        <p class="modal-text" id="modal-notes"></p>
      </div>

      <p class="modal-label">Description</p>
      <p class="modal-text" id="modal-desc"></p>
    </div>
  </div>
</div>

<!-- javascript to track clicks -->
<script>
  const modal    = document.getElementById('course-modal');
  const backdrop = document.getElementById('modal-backdrop');

  function showSection(wrapperId, text) {
    const el = document.getElementById(wrapperId);
    if (text && text !== 'None' && text.trim() !== '') {
      el.style.display = 'block';
    } else {
      el.style.display = 'none';
    }
  }

  function openModal(card) {
    const prereqs = card.dataset.prereqs || '';
    const coreqs  = card.dataset.coreqs  || '';
    const notes   = card.dataset.notes   || '';

    document.getElementById('modal-name').textContent   = card.dataset.name   || '';
    document.getElementById('modal-blocks').textContent = card.dataset.blocks ? card.dataset.blocks + ' block(s)' : '';
    document.getElementById('modal-prereqs').textContent = prereqs;
    document.getElementById('modal-coreqs').textContent  = coreqs;
    document.getElementById('modal-notes').textContent   = notes;
    document.getElementById('modal-desc').textContent    = card.dataset.description || '';

    showSection('modal-prereqs-wrap', prereqs);
    showSection('modal-coreqs-wrap',  coreqs);
    showSection('modal-notes-wrap',   notes);

    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = '';
  }

  document.querySelectorAll('.course-card').forEach(card => {
    card.addEventListener('click', () => openModal(card));
  });

  document.getElementById('modal-close').addEventListener('click', closeModal);

  backdrop.addEventListener('click', e => {
    if (e.target === backdrop) closeModal();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
</script>
