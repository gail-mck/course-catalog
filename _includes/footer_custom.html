<!-- Modal is the popup on top of the other stuff -->
<div id="course-modal" class="modal-overlay" aria-modal="true" role="dialog">
  <div class="modal-box">
    <button class="modal-close" id="modal-close" aria-label="Close">×</button>
    <h2 id="modal-name"></h2>
    <p class="modal-blocks" id="modal-blocks"></p>

    <div id="modal-prereqs-section">
      <p class="modal-section-label">Prerequisites</p>
      <p class="modal-section-text" id="modal-prereqs"></p>
    </div>

    <div id="modal-coreqs-section">
      <p class="modal-section-label">Corequisites</p>
      <p class="modal-section-text" id="modal-coreqs"></p>
    </div>

    <div id="modal-notes-section">
      <p class="modal-section-label">Notes</p>
      <p class="modal-section-text" id="modal-notes"></p>
    </div>

    <p class="modal-section-label">Description</p>
    <p class="modal-section-text" id="modal-description"></p>
  </div>
</div>

<!-- Javascript! -->
<script>
  const modal       = document.getElementById('course-modal');
  const modalName   = document.getElementById('modal-name');
  const modalBlocks = document.getElementById('modal-blocks');
  const modalPrereqs = document.getElementById('modal-prereqs');
  const modalCoreqs  = document.getElementById('modal-coreqs');
  const modalNotes   = document.getElementById('modal-notes');
  const modalDesc    = document.getElementById('modal-description');

  const prereqSection = document.getElementById('modal-prereqs-section');
  const coreqSection  = document.getElementById('modal-coreqs-section');
  const notesSection  = document.getElementById('modal-notes-section');

  function openModal(card) {
    const prereqs = card.dataset.prereqs || '';
    const coreqs  = card.dataset.coreqs  || '';
    const notes   = card.dataset.notes   || '';

    modalName.textContent   = card.dataset.name   || '';
    modalBlocks.textContent = card.dataset.blocks ? card.dataset.blocks + ' block(s)' : '';
    modalDesc.textContent   = card.dataset.description || '';

    // Only show sections that have content
    modalPrereqs.textContent = prereqs;
    prereqSection.style.display = (prereqs && prereqs !== 'None') ? 'block' : 'none';

    modalCoreqs.textContent = coreqs;
    coreqSection.style.display = (coreqs && coreqs !== 'None') ? 'block' : 'none';

    modalNotes.textContent = notes;
    notesSection.style.display = notes ? 'block' : 'none';

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
  }

  // Attach click to all course cards
  document.querySelectorAll('.course-card').forEach(card => {
    card.addEventListener('click', () => openModal(card));
  });

  // Close on button click
  document.getElementById('modal-close').addEventListener('click', closeModal);

  // Close on backdrop click
  modal.addEventListener('click', e => {
    if (e.target === modal) closeModal();
  });

  // Close on Escape key
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
</script>
