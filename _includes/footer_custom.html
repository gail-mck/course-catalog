<!-- styles from online -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<!-- Fonts, color vairables, background, side bar, side title, navigation links, full-width, course grid, course cards, popup/modal overlay-->
<style>

  body, .main-content, p, li, .nav-list-link {
    font-family: 'Nunito', sans-serif !important;
  }
  h1, h2, h3, h4, .site-title {
    font-family: 'Playfair Display', serif !important;
  }

  :root {
    --red:    #C41230;
    --cream:  #FAF8F5;
    --dark:   #3B1F1F;
    --shadow: rgba(0,0,0,0.08);
  }

  body { background-color: var(--cream) !important; }

  .side-bar {
    width: 200px !important;
    min-width: 200px !important;
    background-color: #EDE8E0 !important;
  }
  .main { margin-left: 200px !important; }

  .site-title {
    color: var(--red) !important;
    font-size: 1.2rem !important;
  }

  .nav-list-link:hover,
  .nav-list-link.active {
    color: var(--red) !important;
  }

  .main-content-wrap {
    max-width: 100% !important;
    margin-left: 0 !important;
    margin-right: 0 !important;
  }
  .main-content { max-width: 100% !important; }

  .course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    padding: 1.5rem 0;
  }

  .course-card {
    background: #fff;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    box-shadow: 0 2px 10px var(--shadow);
    cursor: pointer;
    border-left: 4px solid var(--red);
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .course-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.13);
  }
  .course-card strong {
    color: #1a1a1a;
    font-size: 0.95rem;
    line-height: 1.3;
  }
  .course-card p {
    color: #777;
    font-size: 0.8rem;
    margin: 0;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-box {
    background: #fff;
    border-radius: 16px;
    padding: 2rem;
    max-width: 580px;
    width: 100%;
    max-height: 82vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-box h2 {
    font-family: 'Playfair Display', serif !important;
    color: var(--red);
    margin-top: 0;
    margin-bottom: 0.2rem;
    font-size: 1.4rem;
  }
  .modal-meta {
    color: #999;
    font-size: 0.85rem;
    margin-bottom: 1.25rem;
  }
  .modal-label {
    font-weight: 700;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--red);
    margin: 1rem 0 0.2rem;
  }
  .modal-text {
    color: #333;
    font-size: 0.9rem;
    line-height: 1.65;
    margin: 0;
  }
  .modal-close {
    position: absolute;
    top: 0.9rem;
    right: 0.9rem;
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: #bbb;
    padding: 0.2rem 0.5rem;
    border-radius: 6px;
    transition: background 0.1s, color 0.1s;
  }
  .modal-close:hover {
    background: #f0f0f0;
    color: #333;
  }
</style>

<!-- The modal boxes that come up when a course is clicked -->

<div id="course-modal" style="display:none;" role="dialog" aria-modal="true">
  <div class="modal-overlay" id="modal-backdrop">
    <div class="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      <h2 id="modal-name"></h2>
      <p class="modal-meta" id="modal-blocks"></p>

      <div id="modal-prereqs-wrap">
        <p class="modal-label">Prerequisites</p>
        <p class="modal-text" id="modal-prereqs"></p>
      </div>

      <div id="modal-coreqs-wrap">
        <p class="modal-label">Corequisites</p>
        <p class="modal-text" id="modal-coreqs"></p>
      </div>

      <div id="modal-notes-wrap">
        <p class="modal-label">Notes</p>
        <p class="modal-text" id="modal-notes"></p>
      </div>

      <p class="modal-label">Description</p>
      <p class="modal-text" id="modal-desc"></p>
    </div>
  </div>
</div>

<!-- javascript to track clicks -->
<script>
  const modal    = document.getElementById('course-modal');
  const backdrop = document.getElementById('modal-backdrop');

  function showSection(wrapperId, text) {
    const el = document.getElementById(wrapperId);
    if (text && text !== 'None' && text.trim() !== '') {
      el.style.display = 'block';
    } else {
      el.style.display = 'none';
    }
  }

  function openModal(card) {
    const prereqs = card.dataset.prereqs || '';
    const coreqs  = card.dataset.coreqs  || '';
    const notes   = card.dataset.notes   || '';

    document.getElementById('modal-name').textContent   = card.dataset.name   || '';
    document.getElementById('modal-blocks').textContent = card.dataset.blocks ? card.dataset.blocks + ' block(s)' : '';
    document.getElementById('modal-prereqs').textContent = prereqs;
    document.getElementById('modal-coreqs').textContent  = coreqs;
    document.getElementById('modal-notes').textContent   = notes;
    document.getElementById('modal-desc').textContent    = card.dataset.description || '';

    showSection('modal-prereqs-wrap', prereqs);
    showSection('modal-coreqs-wrap',  coreqs);
    showSection('modal-notes-wrap',   notes);

    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = '';
  }

  document.querySelectorAll('.course-card').forEach(card => {
    card.addEventListener('click', () => openModal(card));
  });

  document.getElementById('modal-close').addEventListener('click', closeModal);

  backdrop.addEventListener('click', e => {
    if (e.target === backdrop) closeModal();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
</script>
